<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRS Hospital - Smart Doctor Portal</title>
    <!-- Tailwind CSS for Modern UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F0Fdf9; }
        
        /* Custom Colors from Screenshot */
        .bg-srs-primary { background-color: #20948B; }
        .text-srs-primary { color: #20948B; }
        .border-srs-primary { border-color: #20948B; }
        
        /* Smooth transitions */
        .card-transition { transition: all 0.3s ease; }
        .card-transition:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        /* Blackout Style for Shift Over */
        .blackout-card { 
            background-color: #1e293b !important; 
            color: #94a3b8 !important; 
            border-color: #0f172a !important; 
        }
        .blackout-card h3 { color: #f8fafc !important; }
        .blackout-card p, .blackout-card span { color: #94a3b8 !important; }
        .blackout-card .icon-box { background-color: #334155 !important; color: #64748b !important; }
        .blackout-card input { background-color: #334155 !important; color: #f8fafc !important; border-color: #475569 !important; }

        /* Print Styles - Ultra Compact to fit 52 doctors on 1 page */
        @media print {
            body { background-color: white; }
            #app-ui { display: none !important; }
            #print-section { display: block !important; }
            
            @page { size: A4 portrait; margin: 8mm; }
            
            #print-section { 
                width: 100%; 
                font-family: 'Times New Roman', serif;
            }
            .print-header { 
                text-align: center; 
                font-weight: bold; 
                font-size: 12px; 
                margin-bottom: 5px;
                text-transform: uppercase;
                border-bottom: 1px solid black;
                padding-bottom: 2px;
            }
            .print-table { 
                width: 100%; 
                border-collapse: collapse; 
                font-size: 9px; /* Very small to fit one page */
            }
            .print-table th, .print-table td { 
                border: 1px solid #333; 
                padding: 2px 4px; 
                text-align: center; 
            }
            .print-table th { 
                background-color: #e5e5e5 !important; 
                -webkit-print-color-adjust: exact; 
                font-weight: bold;
            }
            .dept-header {
                background-color: #f0f0f0 !important;
                -webkit-print-color-adjust: exact;
                font-weight: bold;
                text-align: center;
                font-size: 10px;
                padding: 1px;
            }
        }
    </style>
</head>

                </div>
                <div>
                    <h1 class="text-2xl font-bold text-slate-800 tracking-tight">SRS Hospital</h1>
                    <p class="text-xs text-slate-500 font-medium">Digital OPD System (52 Doctors)</p>
                </div>
            </div>
            
            <div class="flex flex-wrap items-center justify-center gap-3">
                <!-- Mode Toggle -->
                <div class="bg-slate-100 p-1 rounded-xl flex items-center shadow-inner">
                    <button id="btn-reception" onclick="setMode('RECEPTION')" class="px-4 py-2 rounded-lg text-sm font-semibold transition-all shadow-sm bg-white text-srs-primary">
                        <i class="fa-solid fa-desktop mr-1"></i> Reception
                    </button>
                    <button id="btn-opd" onclick="setMode('OPD')" class="px-4 py-2 rounded-lg text-sm font-semibold transition-all text-slate-500 hover:text-slate-700">
                        <i class="fa-solid fa-user-nurse mr-1"></i> OPD Staff
                    </button>

                <button onclick="checkTimings(true)" class="bg-indigo-50 text-indigo-600 hover:bg-indigo-100 px-4 py-2 rounded-xl text-sm font-semibold transition-all shadow-sm flex items-center gap-2 border border-indigo-200" title="Force Timer Check">
                    <i class="fa-solid fa-clock-rotate-left"></i> Sync Timer
                </button>

                <!-- Export/Print Button -->
                <button onclick="window.print()" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-xl text-sm font-semibold transition-all shadow-md flex items-center gap-2">
                    <i class="fa-solid fa-print"></i> Export List

            </div>
        </header>

        <!-- Search & Info Bar -->

            <div class="relative w-full md:w-1/2">

            </div>
            <div class="flex flex-wrap items-center gap-3 text-xs font-semibold text-slate-500 justify-center">

                <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-blue-500"></span> On Rounds</span>
                <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-rose-500"></span> Absent</span>
                <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-slate-800"></span> Shift Over</span>
                <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-amber-500"></span> Scheduled</span>
            </div>
        </div>

        <!-- Dynamic List Container -->

    </div>

            "Available": 1,
            "On Rounds": 2,
            "Scheduled": 3,
            "Absent": 4,

        const statusColors = {
            "Available": "bg-emerald-100 text-emerald-700 border-emerald-200",
            "On Rounds": "bg-blue-100 text-blue-700 border-blue-200",
            "Scheduled": "bg-amber-100 text-amber-700 border-amber-200",

        // Icon Mapping based on department
        const getIcon = (dept) => {
            const d = dept.toUpperCase();
            if(d.includes('CARDIO')) return { icon: 'fa-heart', color: 'text-rose-500', bg: 'bg-rose-100' };
            if(d.includes('ORTHO')) return { icon: 'fa-bone', color: 'text-blue-500', bg: 'bg-blue-100' };
            if(d.includes('NEURO')) return { icon: 'fa-brain', color: 'text-purple-500', bg: 'bg-purple-100' };

        function setMode(mode) {

            }
            renderDoctors();
        }

        function updateStatus(id, newStatus) {
            const doc = doctors.find(d => d.id === id);
            if(doc) { doc.status = newStatus; renderDoctors(); }
        }

        function updateTime(id, newTime) {
            const doc = doctors.find(d => d.id === id);
            if(doc) { doc.time = newTime; }
        }

        // Auto Blackout Logic Based on Time
        function parseTime(timeStr) {
            // Example: "06:30 PM" -> returns Date object for today at 18:30
            const [time, modifier] = timeStr.trim().split(' ');
            if(!time || !modifier) return null;
            let [hours, minutes] = time.split(':');
            if(!hours || !minutes) return null;
            
            if (hours === '12') hours = '00';
            if (modifier.toUpperCase() === 'PM') hours = parseInt(hours, 10) + 12;
            
            let d = new Date();
            d.setHours(hours, minutes, 0, 0);
            return d;
        }

        function checkTimings(manual = false) {
            const now = new Date();
            let changed = false;
            
            doctors.forEach(doc => {
                if (doc.status === 'Absent' || doc.status === 'Shift Over') return;
                
                // Parse format like "10:00 AM TO 12:00 PM"
                if (doc.time.includes('TO')) {
                    const endStr = doc.time.split('TO')[1].trim();
                    const endDate = parseTime(endStr);
                    if (endDate && now > endDate) {
                        doc.status = 'Shift Over'; // Auto Blackout
                        changed = true;
                    }
                }
            });
            if(changed || manual) renderDoctors();
        }

        // Run timer check every 1 minute
        setInterval(checkTimings, 60000);

        function renderDoctors() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            const listContainer = document.getElementById('doctor-list');
            listContainer.innerHTML = '';
            
            let filteredDoctors = doctors.filter(doc => 
                doc.name.toLowerCase().includes(searchQuery) || 
                doc.dept.toLowerCase().includes(searchQuery)
            );

            // Sort logic
            filteredDoctors.sort((a, b) => {
                if (statusPriority[a.status] !== statusPriority[b.status]) {
                    return statusPriority[a.status] - statusPriority[b.status];
                }
                return a.name.localeCompare(b.name);
            });

            filteredDoctors.forEach(doc => {
                const isBlackout = (doc.status === 'Shift Over');
                
                const card = document.createElement('div');
                card.className = `bg-white p-4 rounded-xl shadow-sm border border-slate-100 card-transition flex flex-col justify-between h-full ${isBlackout ? 'blackout-card' : ''}`;
                
                const iconObj = getIcon(doc.dept);
                
                // Render Editable Time Input for OPD, Static Text for Reception
                let timeDisplayHTML = '';
                if(currentMode === 'OPD') {
                    timeDisplayHTML = `<input type="text" value="${doc.time}" onchange="updateTime(${doc.id}, this.value)" class="text-xs bg-slate-50 border border-slate-200 rounded px-1.5 py-0.5 w-full font-medium text-slate-700 outline-none focus:border-teal-400" placeholder="Set today's time">`;
                } else {
                    timeDisplayHTML = `<span class="text-slate-700 font-medium text-xs truncate" title="${doc.time}">${doc.time}</span>`;
                }

                let actionHTML = '';
                
                if (currentMode === 'RECEPTION') {
                    actionHTML = `
                        <div class="mt-3 pt-3 border-t border-slate-100 flex items-center justify-between">
                            <span class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider">Current Status</span>
                            <span class="px-2.5 py-1 rounded-md text-xs font-bold border flex items-center gap-1 ${statusColors[doc.status]}">
                                ${doc.status}
                            </span>
                        </div>
                    `;
                } else {
                    // OPD: Toggle Buttons (Radio group styled as sliding buttons)
                    actionHTML = `
                        <div class="mt-3 pt-3 border-t border-slate-100">
                            <div class="flex w-full bg-slate-100 rounded-lg p-1 gap-1">
                                <label class="flex-1 text-center cursor-pointer">
                                    <input type="radio" name="status-${doc.id}" value="Available" ${doc.status==='Available'?'checked':''} class="peer sr-only" onchange="updateStatus(${doc.id}, this.value)">
                                    <div class="peer-checked:bg-emerald-500 peer-checked:text-white text-slate-500 text-[10px] sm:text-xs py-1.5 font-bold rounded-md transition-all">Avail</div>
                                </label>
                                <label class="flex-1 text-center cursor-pointer">
                                    <input type="radio" name="status-${doc.id}" value="On Rounds" ${doc.status==='On Rounds'?'checked':''} class="peer sr-only" onchange="updateStatus(${doc.id}, this.value)">
                                    <div class="peer-checked:bg-blue-500 peer-checked:text-white text-slate-500 text-[10px] sm:text-xs py-1.5 font-bold rounded-md transition-all">Round</div>
                                </label>
                                <label class="flex-1 text-center cursor-pointer">
                                    <input type="radio" name="status-${doc.id}" value="Absent" ${doc.status==='Absent'?'checked':''} class="peer sr-only" onchange="updateStatus(${doc.id}, this.value)">
                                    <div class="peer-checked:bg-rose-500 peer-checked:text-white text-slate-500 text-[10px] sm:text-xs py-1.5 font-bold rounded-md transition-all">Absent</div>
                                </label>
                                <label class="flex-1 text-center cursor-pointer">
                                    <input type="radio" name="status-${doc.id}" value="Shift Over" ${doc.status==='Shift Over'?'checked':''} class="peer sr-only" onchange="updateStatus(${doc.id}, this.value)">
                                    <div class="peer-checked:bg-slate-700 peer-checked:text-white text-slate-500 text-[10px] sm:text-xs py-1.5 font-bold rounded-md transition-all">Over</div>
                                </label>
                            </div>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div>
                        <div class="flex gap-3">
                            <div class="icon-box ${iconObj.bg} ${iconObj.color} w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 shadow-sm">
                                <i class="fa-solid ${iconObj.icon} text-lg"></i>
                            </div>
                            <div class="flex-1 overflow-hidden">
                                <h3 class="text-sm font-bold text-slate-800 leading-tight truncate" title="${doc.name}">${doc.name}</h3>
                                <p class="text-[11px] font-semibold text-srs-primary mt-0.5 truncate">${doc.dept}</p>
                            </div>
                        </div>
                        
                        <div class="mt-3 grid grid-cols-2 gap-y-2 gap-x-2 text-sm">
                            <div class="flex flex-col w-full overflow-hidden">
                                <span class="text-[10px] text-slate-400 font-medium uppercase">Today's Time</span>
                                ${timeDisplayHTML}
                            </div>
                            <div class="flex flex-col">
                                <span class="text-[10px] text-slate-400 font-medium uppercase">Fee/Details</span>
                                <span class="text-slate-700 font-medium text-xs"><i class="fa-solid fa-indian-rupee-sign text-slate-400 mr-1 text-[10px]"></i> ${doc.fee}</span>
                            </div>
                        </div>
                    </div>
                    ${actionHTML}
                `;
                listContainer.appendChild(card);
            });

            renderPrintTable();
        }

        function renderPrintTable() {
            const tbody = document.getElementById('print-table-body');
            const depts = [...new Set(doctors.map(d => d.dept))];
            
            let html = `
                <tr>
                    <th width="3%">S#</th>
                    <th width="22%">DOCTOR NAME</th>
                    <th width="25%">TODAY'S TIMING</th>
                    <th width="10%">FEE</th>
                    <th width="20%">DAYS</th>
                    <th width="20%">CURRENT STATUS</th>
                </tr>
            `;

            let sno = 1;
            depts.forEach(dept => {
                const docsInDept = doctors.filter(d => d.dept === dept);
                if(docsInDept.length > 0) {
                    html += `<tr><td colspan="6" class="dept-header">${dept}</td></tr>`;
                    docsInDept.forEach(doc => {
                        let boldStyle = (doc.status === 'Available' || doc.status === 'On Rounds') ? 'font-weight:bold;' : '';
                        html += `
                            <tr>
                                <td>${sno++}</td>
                                <td style="text-align:left; padding-left:4px;">${doc.name}</td>
                                <td>${doc.time}</td>
                                <td>${doc.fee}</td>
                                <td>${doc.days}</td>
                                <td style="${boldStyle}">${doc.status}</td>
                            </tr>
                        `;
                    });
                }
            });
            tbody.innerHTML = html;
        }

        // Initialize App
        setTimeout(checkTimings, 500); // Check timings immediately on load
        renderDoctors();
    </script>
</body>
</html>
